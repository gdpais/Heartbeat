apiVersion: apps/v1
kind: Deployment
metadata:
  name: db-collector
  namespace: heartbeat
spec:
  replicas: 1
  selector:
    matchLabels:
      app: db-collector
  template:
    metadata:
      labels:
        app: db-collector
    spec:
      containers:
        - name: db-collector
          image: heartbeat/db-collector:local
          imagePullPolicy: IfNotPresent
          env:
            - name: HEARTBEAT_DB_COLLECTOR_LISTEN_ADDR
              value: :8082
            - name: HEARTBEAT_INTEGRATIONS_PATH
              value: /app/config/integrations.yaml
            - name: HEARTBEAT_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: heartbeat-runtime
                  key: admin-token
            - name: HEARTBEAT_CONFIG_WATCH_INTERVAL
              value: 5s
          ports:
            - containerPort: 8082
          volumeMounts:
            - name: config
              mountPath: /app/config
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: heartbeat-config
---
apiVersion: v1
kind: Service
metadata:
  name: db-collector
  namespace: heartbeat
spec:
  selector:
    app: db-collector
  ports:
    - port: 8082
      targetPort: 8082
