services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: heartbeat
      POSTGRES_USER: heartbeat
      POSTGRES_PASSWORD: heartbeat
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../db/migrations:/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U heartbeat -d heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 10

  db-collector:
    build:
      context: ..
      dockerfile: services/db-collector/Dockerfile
    environment:
      HEARTBEAT_DB_COLLECTOR_LISTEN_ADDR: :8082
      HEARTBEAT_INTEGRATIONS_PATH: /app/config/integrations.yaml
    ports:
      - "8082:8082"
    volumes:
      - ../config/integrations.yaml:/app/config/integrations.yaml:ro

volumes:
  postgres_data:
